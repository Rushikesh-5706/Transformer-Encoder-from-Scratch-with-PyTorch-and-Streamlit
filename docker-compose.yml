version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rushi5706/transformer-encoder-scratch:latest
    container_name: transformer-encoder-app
    ports:
      - "8501:8501"
    environment:
      - DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
